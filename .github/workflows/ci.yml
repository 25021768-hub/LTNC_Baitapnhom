name: CI – Build & Test (Multi-OS)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            javafx_platform: linux
          - os: windows-latest
            javafx_platform: win
          - os: macos-latest
            javafx_platform: mac

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Grant execute permission for mvnw (Unix)
        if: runner.os != 'Windows'
        run: chmod +x mvnw

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Install Linux GUI libs
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-0 libglib2.0-0 libgl1 libx11-6 xvfb

      # Dùng shell: bash trên mọi OS để tránh vấn đề PowerShell parse -D
      - name: Compile
        shell: bash
        run: mvn compile -B -Djavafx.platform=${{ matrix.javafx_platform }}

      - name: Package JAR (skip tests – cần MySQL)
        shell: bash
        run: mvn package -B -DskipTests -Djavafx.platform=${{ matrix.javafx_platform }}

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: OnlineAuctionSystem-${{ matrix.javafx_platform }}
          path: target/*.jar
          if-no-files-found: warn
          retention-days: 7
